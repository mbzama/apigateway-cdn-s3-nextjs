name: Deploy Next.js to S3 + CloudFront

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: 'Invalidate CloudFront cache after deploy'
        required: false
        default: 'true'

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:
  # Validate Terraform configuration
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check

      - name: Terraform Validation
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan (dry-run)
        working-directory: ./terraform
        run: terraform plan -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # Build and test the Next.js application
  build:
    name: Build Next.js App
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run tests (if available)
        run: npm test --passWithNoTests
        continue-on-error: true

      - name: Export to static files
        run: |
          # Verify output directory exists
          if [ ! -d "out" ]; then
            echo "Error: out directory not found. Ensure next.config.ts has 'output: export'"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: next-build
          path: out/
          retention-days: 1

      - name: Check build size
        run: |
          SIZE=$(du -sh out/ | cut -f1)
          echo "Build size: $SIZE"

  # Deploy to AWS
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: next-build
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Get Terraform Outputs
        working-directory: ./terraform
        id: tf_outputs
        run: |
          terraform init
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT

      - name: Sync HTML files to S3 (1 hour cache)
        env:
          S3_BUCKET: ${{ steps.tf_outputs.outputs.s3_bucket }}
        run: |
          find out -name "*.html" -type f | while read file; do
            relative_path="${file#out/}"
            aws s3 cp "$file" "s3://$S3_BUCKET/$relative_path" \
              --cache-control "public, max-age=3600" \
              --content-type "text/html" \
              --no-progress
          done

      - name: Sync Next.js static assets to S3 (1 year cache)
        env:
          S3_BUCKET: ${{ steps.tf_outputs.outputs.s3_bucket }}
        run: |
          find out/_next -type f 2>/dev/null | while read file; do
            relative_path="${file#out/}"
            content_type="application/octet-stream"
            
            if [[ $file == *.js ]]; then
              content_type="application/javascript"
            elif [[ $file == *.css ]]; then
              content_type="text/css"
            elif [[ $file == *.woff ]]; then
              content_type="font/woff"
            elif [[ $file == *.woff2 ]]; then
              content_type="font/woff2"
            fi
            
            aws s3 cp "$file" "s3://$S3_BUCKET/$relative_path" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "$content_type" \
              --no-progress
          done

      - name: Sync other assets to S3 (24 hours cache)
        env:
          S3_BUCKET: ${{ steps.tf_outputs.outputs.s3_bucket }}
        run: |
          find out -type f ! -name "*.html" ! -path "out/_next/*" | while read file; do
            relative_path="${file#out/}"
            aws s3 cp "$file" "s3://$S3_BUCKET/$relative_path" \
              --cache-control "public, max-age=86400" \
              --no-progress 2>/dev/null || true
          done

      - name: Remove deleted files from S3
        env:
          S3_BUCKET: ${{ steps.tf_outputs.outputs.s3_bucket }}
        run: |
          # Get list of files in S3
          aws s3 ls "s3://$S3_BUCKET" --recursive | awk '{print $4}' > /tmp/s3_files.txt
          
          # Get list of local files
          find out -type f | sed 's|^out/||' > /tmp/local_files.txt
          
          # Find files in S3 but not locally
          comm -23 <(sort /tmp/s3_files.txt) <(sort /tmp/local_files.txt) | while read file; do
            if [ ! -z "$file" ] && [ "$file" != "logs/" ]; then
              echo "Deleting: $file"
              aws s3 rm "s3://$S3_BUCKET/$file" --no-progress
            fi
          done

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_ID: ${{ steps.tf_outputs.outputs.cloudfront_id }}
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          echo "Invalidation created: $INVALIDATION_ID"
          echo "INVALIDATION_ID=$INVALIDATION_ID" >> $GITHUB_ENV

      - name: Wait for CloudFront invalidation
        env:
          CLOUDFRONT_ID: ${{ steps.tf_outputs.outputs.cloudfront_id }}
        run: |
          echo "Waiting for CloudFront invalidation..."
          for i in {1..30}; do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id "$CLOUDFRONT_ID" \
              --id "$INVALIDATION_ID" \
              --query 'Invalidation.Status' \
              --output text)
            
            if [ "$STATUS" = "Completed" ]; then
              echo "✓ Invalidation completed"
              exit 0
            fi
            
            echo "Status: $STATUS (attempt $i/30)..."
            sleep 10
          done
          
          echo "⚠ Invalidation still in progress (will complete in background)"

      - name: Deploy notification
        if: success()
        run: |
          echo "✓ Deployment completed successfully!"
          echo ""
          echo "Application URL: https://app-dev.zamait.in"
          echo "S3 Bucket: ${{ steps.tf_outputs.outputs.s3_bucket }}"
          echo "CloudFront Distribution: ${{ steps.tf_outputs.outputs.cloudfront_id }}"

  # Notify on failure
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [validate, build, deploy]

    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Deployment to S3 + CloudFront failed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # Performance test (optional)
  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v9
        with:
          configPath: './lighthouse-config.json'
          uploadArtifacts: true
        continue-on-error: true

      - name: Performance test (curl)
        run: |
          RESPONSE_TIME=$(curl -w "%{time_total}" -o /dev/null -s https://app-dev.zamait.in)
          echo "Response time: ${RESPONSE_TIME}s"
          
          # Alert if response time is too high
          if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
            echo "⚠ Warning: Response time is higher than expected"
          fi

# Secrets required in GitHub:
# - AWS_ACCESS_KEY_ID: AWS access key for deployment
# - AWS_SECRET_ACCESS_KEY: AWS secret access key for deployment
# - SLACK_WEBHOOK (optional): Slack webhook for notifications
